<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mediflow</title>

    <link rel="stylesheet" href="style.css">
    
</head>

<body>
    
    <div class="container">
        <div>
            <img src="./assets/logo.png" alt="Mediflow" class="logo">
    
        </div>
        

        <form id="loginForm">

            <input
                type="email"
                id="loginEmail"
                placeholder="Email"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Contraseña"
                required
            >

            <button type="submit">
                Ingresar
            </button>

        </form>

        <p>
            ¿No tienes cuenta aún?
            <a href="register.html">
                Registrarse
            </a>
        </p>

    </div>

    <script src="auth.js"></script>
    <div id="toast"></div>
</body>
</html>
